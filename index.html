<!DOCTYPE html>
<html>
<head>
    <title>Volcanologic Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([37.0902, -95.7129], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Fetch from the official USGS HANS API
        fetch('https://volcanoes.usgs.gov/hans-public/api/volcano/getMonitoredVolcanoes')
            .then(response => response.json())
            .then(data => {
                // The data returns an object where we need to iterate over the volcanoes
                data.forEach(v => {
                    // Check if coordinates exist
                    if (v.latitude && v.longitude) {
                        L.marker([v.latitude, v.longitude])
                         .addTo(map)
                         .bindPopup(`<b>${v.volcanoName}</b><br>Status: ${v.currentAlertLevel || 'N/A'}`);
                    }
                });
            })
            .catch(error => console.error('Error fetching volcano data:', error));
    </script>
</body>
</html>
