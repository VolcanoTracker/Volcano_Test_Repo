<!DOCTYPE html>
<html>
<head>
    <title>Global Volcano Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Fetch Global Volcanoes
        fetch('https://volcanoes.usgs.gov/vsc/api/volcanoApi/volcanoesGVP')
            .then(res => res.json())
            .then(data => {
                data.forEach(v => {
                    if (v.lat && v.lon) {
                        L.marker([v.lat, v.lon])
                         .addTo(map)
                         .bindPopup(`<b>${v.vName}</b><br>ID: ${v.volcanoCd}`);
                    }
                });
            });
    </script>
</body>
</html>
